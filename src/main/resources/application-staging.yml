# ===================================================================
# Staging Profile Configuration
# ===================================================================
# Staging sits between dev and prod:
# - Uses a separate database (never touches production data)
# - Uses Paystack TEST keys
# - Has debug logging enabled
# - May have devtools if needed for remote debugging
# ===================================================================

spring:
  config:
    activate:
      on-profile: staging

  application:
    name: school-saas-staging

  datasource:
    url: ${JDBC_DATABASE_URL:${SPRING_DATASOURCE_URL}}
    username: ${JDBC_DATABASE_USERNAME:${SPRING_DATASOURCE_USERNAME:}}
    password: ${JDBC_DATABASE_PASSWORD:${SPRING_DATASOURCE_PASSWORD:}}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 8
      minimum-idle: 2
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000

  jpa:
    hibernate:
      # IMPORTANT: Set to 'update' for FIRST boot on an empty database.
      # After the first successful startup, change this back to 'validate'.
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 10
        order_inserts: true
        order_updates: true

  flyway:
    # IMPORTANT: Set to 'false' for FIRST boot on an empty database.
    # After the first successful startup, change this back to 'true'.
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:true}

server:
  port: ${SERVER_PORT:8080}
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain
  error:
    include-message: always
    include-stacktrace: on_param

# JWT Configuration
jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION_MS:3600000}      # 1 hour (longer for staging/testing)
  refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION_MS:604800000}  # 7 days

# OpenAI Configuration
openai:
  api-key: ${OPENAI_API_KEY}
  model: ${OPENAI_MODEL:gpt-4o-mini}

# Paystack Configuration — ALWAYS use TEST keys in staging
paystack:
  secret-key: ${PAYSTACK_SECRET_KEY}
  public-key: ${PAYSTACK_PUBLIC_KEY}
  base-url: https://api.paystack.co
  callback-url: ${PAYSTACK_CALLBACK_URL}

# CORS Configuration (include your Vercel preview domains)
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}

# Logging (more verbose in staging for debugging)
logging:
  level:
    root: INFO
    com.schoolsaas: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
