name: Backend CI/CD

on:
  push:
    branches: [main, develop, staging]
    paths:
      - 'src/**'
      - 'pom.xml'
      - 'Dockerfile'
      - 'railway.toml'
      - 'application*.yml'
  pull_request:
    branches: [main, staging]
    paths:
      - 'src/**'
      - 'pom.xml'

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: schoolsaas_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run Tests
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/schoolsaas_test
          SPRING_DATASOURCE_USERNAME: test
          SPRING_DATASOURCE_PASSWORD: test
          JWT_SECRET: test-jwt-secret-key-not-for-production-use-12345
          PAYSTACK_SECRET_KEY: sk_test_dummy
          OPENAI_API_KEY: sk-dummy
        run: ./mvnw test -B

      - name: Build JAR
        run: ./mvnw package -DskipTests -B

  # ------------------------------------------------------------------
  # PRODUCTION DEPLOY
  # ------------------------------------------------------------------
  deploy-production:
    name: Deploy to Railway (Production)
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ vars.SERVICE_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Production Service
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service=${{ vars.RAILWAY_SERVICE_NAME }} --detach

  # ------------------------------------------------------------------
  # STAGING DEPLOY
  # ------------------------------------------------------------------
  deploy-staging:
    name: Deploy to Railway (Staging)
    needs: test
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: ${{ vars.STAGING_SERVICE_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Staging Service
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service=${{ vars.RAILWAY_STAGING_SERVICE_NAME }} --detach
